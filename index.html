<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SpeakFlow AI</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="logo">SpeakFlow</div>
      <div class="tag">AI English Speaking</div>
    </header>

    <main class="main">
      <section class="hero">
        <h1>Practice English with AI</h1>
        <p>Speak naturally. Build confidence. Learn every day.</p>
      </section>

      <section class="chat-card">
        <div class="chat-window" id="chatWindow">
          <div class="msg ai">Hi! I’m your AI English partner. What would you like to practice today?</div>
        </div>

        <div class="input-bar">
          <input id="userInput" type="text" placeholder="Type your message in English..." />
          <button id="sendBtn">Send</button>
        </div>
      </section>
    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
